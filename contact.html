    <!-- Content -->
    <main class="main-content">
        <!-- Top Navbar -->
        <nav class="top-navbar">
            <span class="navbar-title">Contact</span>

            <div class="navbar-user">
                <i class="fa-solid fa-circle-user"></i>
                <span>Ahmed</span>
            </div>
        </nav>

        <!-- Contact Section -->
        <section class="contact-section">
            <div class="row g-4">

                <div class="col-md-7" data-aos="fade-up">
                    <div class="contact-card">
                        <h4 class="section-title">Send a Message</h4>

                        <div class="contact-form">
                            <div class="row g-3">

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Full Name</label>
                                        <input type="text" id="from_name" placeholder="Your Name">
                                    </div>
                                </div>

                                <div class="col-md-6">
                                    <div class="form-group">
                                        <label>Email Address</label>
                                        <input type="email" id="from_email" placeholder="Your Email">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-group">
                                        <label>Subject</label>
                                        <input type="text" id="subject" placeholder="Subject">
                                    </div>
                                </div>

                                <div class="col-12">
                                    <div class="form-group">
                                        <label>Message</label>
                                        <textarea rows="5" id="message" placeholder="Message"></textarea>
                                    </div>
                                </div>

                                <div class="col-12">
                                    <button class="btn-submit" id="btn-submit">
                                        <i class="fa-solid fa-paper-plane"></i>
                                        Send Message
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Contact Info -->
                <div class="col-md-5" data-aos="fade-up">
                    <div class="contact-card">
                        <h4 class="section-title">Contact Info</h4>

                        <div class="contact-info-list">

                            <div class="contact-info-item">
                                <div class="contact-info-icon">
                                    <i class="fa-solid fa-envelope"></i>
                                </div>

                                <div>
                                    <p class="contact-info-label">Email</p>
                                    <p class="contact-info-value">ahmed2806.ay@gmail.com</p>
                                </div>
                            </div>

                            <div class="contact-info-item">
                                <div class="contact-info-icon">
                                    <i class="fa-solid fa-phone"></i>
                                </div>

                                <div>
                                    <p class="contact-info-label">Phone</p>
                                    <p class="contact-info-value">+201010529025</p>
                                </div>
                            </div>

                            <div class="contact-info-item">
                                <div class="contact-info-icon">
                                    <i class="fa-solid fa-location-dot"></i>
                                </div>

                                <div>
                                    <p class="contact-info-label">Location</p>
                                    <p class="contact-info-value">Alexandria, Egypt</p>
                                </div>
                            </div>
                        </div>

                        <!-- Social Links -->
                        <h4 class="section-title" style="margin-top: 1.5rem;">Follow Me</h4>

                        <div class="social-links">
                            <a href="#" class="social-link">
                                <i class="fa-brands fa-github"></i>
                            </a>
                            <a href="#" class="social-link">
                                <i class="fa-brands fa-linkedin"></i>
                            </a>
                            <a href="#" class="social-link">
                                <i class="fa-brands fa-facebook"></i>
                            </a>
                            <a href="#" class="social-link">
                                <i class="fa-brands fa-whatsapp"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
